<!-- Transcription Options Component -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  <!-- AI Model -->
  <div class="space-y-2">
    <label class="flex items-center gap-2 text-sm font-medium text-surface-700">
      <span class="material-icons text-primary-500 text-lg">psychology</span>
      AI Model
    </label>
    <select id="modelSelect" class="
      w-full px-3 py-2 border border-surface-300 rounded-lg
      focus:ring-2 focus:ring-primary-500 focus:border-primary-500
      transition-colors duration-200
    ">
      <option value="tiny">Tiny - Fastest</option>
      <option value="base" selected>Base - Balanced</option>
      <option value="small">Small - Better</option>
      <option value="medium">Medium - High Quality</option>
      <option value="large">Large - Best</option>
    </select>
  </div>

  <!-- Language -->
  <div class="space-y-2">
    <label class="flex items-center gap-2 text-sm font-medium text-surface-700">
      <span class="material-icons text-primary-500 text-lg">language</span>
      Language
    </label>
    <select id="languageSelect" class="
      w-full px-3 py-2 border border-surface-300 rounded-lg
      focus:ring-2 focus:ring-primary-500 focus:border-primary-500
      transition-colors duration-200
    ">
      <option value="auto" selected>Auto-detect</option>
      <option value="en">English</option>
      <option value="hi">Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
    </select>
  </div>

  <!-- Speaker Diarization -->
  <div class="space-y-2">
    <label class="flex items-center gap-2 text-sm font-medium text-surface-700">
      <span class="material-icons text-primary-500 text-lg">group</span>
      Speaker Diarization
    </label>
    <div class="flex items-center gap-3">
      <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" id="diarizationCheckbox" checked class="
          w-4 h-4 text-primary-600 border-surface-300 rounded
          focus:ring-primary-500 focus:ring-2
        ">
        <span class="text-sm text-surface-700">Enable</span>
      </label>
    </div>
  </div>

  <!-- Temperature -->
  <div class="space-y-2">
    <label class="flex items-center gap-2 text-sm font-medium text-surface-700">
      <span class="material-icons text-primary-500 text-lg">thermostat</span>
      Temperature
    </label>
    <select id="temperatureSelect" class="
      w-full px-3 py-2 border border-surface-300 rounded-lg
      focus:ring-2 focus:ring-primary-500 focus:border-primary-500
      transition-colors duration-200
    ">
      <option value="0.0">0.0 - Most consistent</option>
      <option value="0.1">0.1 - Very consistent</option>
      <option value="0.2" selected>0.2 - Balanced</option>
      <option value="0.3">0.3 - More creative</option>
      <option value="0.4">0.4 - Creative</option>
    </select>
  </div>
</div>
